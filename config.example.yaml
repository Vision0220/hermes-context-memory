# Hermes Context Memory Service — 配置文件
# 复制为 config.yaml 后修改

server:
  host: "127.0.0.1"
  port: 1833

capture:
  enabled: true
  interval_seconds: 15
  max_width: 1600
  quality: 75
  save_raw_screenshot_days: 14

privacy:
  local_only: true
  excluded_apps:
    - "1Password"
    - "Bitwarden"
    - "KeePass"
    - "WeChat"
    - "微信"
    - "Telegram"
    - "Signal"
    - "Banking"
    - "支付宝"
    - "微信支付"
    - "Windows Security"
    - "Credential Manager"
  excluded_domains:
    - "bank"
    - "paypal"
    - "alipay"
    - "password"
    - "login"
    - "auth"
    - "account"
  redact_keywords:
    - "password"
    - "token"
    - "api_key"
    - "身份证"
    - "银行卡"

models:
  vlm:
    enabled: false
    base_url: "http://127.0.0.1:1234/v1"
    api_key: "lm-studio"
    model: "local-vlm-model"
  embedding:
    enabled: false
    base_url: "http://127.0.0.1:1234/v1"
    api_key: "lm-studio"
    model: "local-embedding-model"

retrieval:
  top_k: 8
  use_vector: true
  use_fts_fallback: true
