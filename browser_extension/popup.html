<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 320px;
      padding: 16px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status.connected {
      background: rgba(76, 175, 80, 0.15);
      border: 1px solid rgba(76, 175, 80, 0.3);
    }
    .status.disconnected {
      background: rgba(244, 67, 54, 0.15);
      border: 1px solid rgba(244, 67, 54, 0.3);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.green { background: #4caf50; }
    .dot.red { background: #f44336; }
    .info {
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
    }
    .last-url {
      font-size: 11px;
      color: #aaa;
      word-break: break-all;
      background: rgba(255,255,255,0.05);
      padding: 8px;
      border-radius: 6px;
      max-height: 60px;
      overflow: hidden;
    }
    .footer {
      margin-top: 12px;
      font-size: 10px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>🧠</span>
    <h1>Hermes Context Memory</h1>
  </div>
  <div id="status" class="status disconnected">
    <span id="dot" class="dot red"></span>
    <span id="statusText">检查连接中...</span>
  </div>
  <div class="info">上次捕获：</div>
  <div id="lastUrl" class="last-url">-</div>
  <div class="footer">本地服务 127.0.0.1:1833</div>
  <script src="popup.js"></script>
</body>
</html>
